name: Automated Community Growth
on:
  push:
    branches: [ main ]
  schedule:
    # Run multiple times per day for varied content
    - cron: '0 9 * * *'   # 9 AM UTC - Morning post
    - cron: '0 17 * * *'  # 5 PM UTC - Evening engagement  
    - cron: '0 21 * * 1'  # 9 PM UTC on Mondays - Weekly planning
    - cron: '0 15 * * 3'  # 3 PM UTC on Wednesdays - Midweek boost
    - cron: '0 12 * * 5'  # 12 PM UTC on Fridays - Weekend prep
  workflow_dispatch:

jobs:
  daily-content-generation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        pip install google-generativeai tweepy praw requests python-dotenv
    
    - name: Generate Daily Content
      env:
        # GitHub token (built-in)
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
        # AI Content Generation (Gemini)
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        AI_PROVIDER: gemini
        
        # Twitter API credentials
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        
        # Disable Reddit for now (focus on Twitter only)
        # REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        # REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        # REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
        # REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
      run: |
        python scripts/daily_post_generator.py

  weekly-community-growth:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1'  # Only run on Monday morning
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        pip install google-generativeai tweepy praw requests python-dotenv
    
    - name: Weekly Community Tasks
      env:
        # GitHub token (built-in)
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
        # AI Content Generation (Gemini)
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        AI_PROVIDER: gemini
        
        # Twitter API credentials
        TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
        TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
        TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        
        # Disable Reddit for now (focus on Twitter only)
        # REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        # REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        # REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
        # REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
      run: |
        python scripts/auto_community_growth.py

  auto-issue-creation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        pip install google-generativeai requests python-dotenv
    
    - name: Auto-generate Good First Issues
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        AI_PROVIDER: gemini
      run: |
        python scripts/auto_generate_issues.py
        
  auto-documentation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        pip install google-generativeai requests python-dotenv
    
    - name: Auto-update Documentation
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        AI_PROVIDER: gemini
      run: |
        python scripts/auto_update_docs.py
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --staged --quiet || git commit -m "Auto-update documentation"
        git push