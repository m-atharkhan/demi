---
# Codacy configuration for Demi Engine
# https://docs.codacy.com/repositories-configure/codacy-configuration-file/

engines:
  # C++ static analysis with Cppcheck
  cppcheck:
    language: c++

  # Duplication detection
  duplication:
    minTokenMatch: 60
    skipLexicalErrors: true
    ignoreLiterals: true
    ignoreIdentifiers: false

  # Cyclomatic complexity and lines-of-code metrics.
  # Switch-statement opcode dispatchers are naturally high-CCN/high-NLOC —
  # splitting them would hurt readability. Raise thresholds in the UI:
  #   Code → Patterns → Lizard_ccn-medium → set threshold to 12
  #   Code → Patterns → Lizard_nloc-medium → set threshold to 80
  metric:
    exclude_paths:
      - "tests/**"
      - "benchmarks/**"
      - "extern/**"
      - "src/engine/opcodes/opcodes_consolidated.cpp"   # Monolithic dispatcher — intentional
      - "src/engine/opcodes/opcode_dispatcher_inlined.cpp"
      - "src/engine/opcodes/opcode_dispatcher_predictive.cpp"
      - "src/engine/opcodes/opcode_dispatcher_threaded.cpp"
      - "src/engine/opcodes/opcode_dispatcher_unified.cpp"
      - "src/assembler/assembler.cpp"   # encode_instruction (CCN 401) — big switch, by design
      - "src/assembler/lexer.cpp"       # init_tables — large lookup table init
      - "src/assembler/parser.cpp"      # parse_statement — recursive descent parser
      - "src/debug/error_handler.cpp"   # code_to_string — error code switch
      - "src/engine/opcodes/instruction_fusion.cpp"  # pattern matching switch
      - "src/test/**"                   # Test code — complexity doesn't matter

  # Flawfinder: exclude device files from the "read buffer boundary" pattern.
  # Our Device::read() interface returns a scalar uint8_t — there is no buffer
  # to overflow. Flawfinder pattern-matches the function name "read" and flags
  # it, but this is a false positive by design.
  flawfinder:
    exclude_paths:
      - "src/engine/devices/**"
      - "src/engine/device.hpp"
      - "src/engine/device_manager.hpp"
      - "src/engine/safe_memcpy.hpp"    # Safe wrapper — internal memcpy is size-verified
      - "src/codegen/elf_emitter.cpp"   # ELF_MAGIC memcpy: constant 4 bytes into 64-byte buffer
      - "src/engine/engine_c_api.cpp"   # All memcpy calls bounds-checked or size-verified
      - "src/engine/virtual_disk.cpp"   # All memcpy calls size-validated before use
      - "src/engine/virtual_disk.hpp"   # read/write use buf+count contract with bounds checks
      - "src/engine/cpu.cpp"            # ::read and syscall handlers already bounds-checked
      - "examples/**"                   # Example code with documented bounds checks
      - "examples/embedding/embedding_06_stdin_c/main.c"  # Explicit path for PR analysis
      - "examples/embedding/embedding_06_stdin_c/**"       # Glob variant

# Global file exclusions
exclude_paths:
  - "build/**"
  - "build-*/**"
  - "bin/**"
  - "extern/**"
  - ".codacy/**"
  - ".trunk/**"
  - "compile_commands.json"
  - "*.o"
  - "*.d"

# Languages
languages:
  cpp:
    enabled: true
