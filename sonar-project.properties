# SonarCloud configuration for Demi Engine
# https://sonarcloud.io/projects
#
# Prerequisites:
#   1. Sign up at https://sonarcloud.io
#   2. Create project for bobrossrtx/demi
#   3. Set SONAR_TOKEN in your CI or environment
#
# For C/C++ analysis, SonarCloud uses the compilation database:
#   make clean && bear -- make
# Or use build-wrapper:
#   build-wrapper-linux-x86-64 --out-dir bw-output make clean all

# Project identity
sonar.projectKey=bobrossrtx_demi
sonar.organization=bobrossrtx
sonar.projectName=Demi Engine
sonar.projectVersion=1.0

# Language
sonar.language=c++

# Source files
sonar.sources=src
sonar.tests=src/test
sonar.exclusions=extern/**,build/**,build-*/**,bin/**

# C++ standard
sonar.cfamily.cpp-version=c++17

# Compilation database (generated by make compile_commands.json)
sonar.cfamily.compile-commands=compile_commands.json

# Or use build-wrapper output:
# sonar.cfamily.build-wrapper-output=bw-output

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage (optional -- enable when gcovr is set up)
# sonar.cfamily.gcov.reportsPath=.
# sonar.cfamily.coverage.reportPaths=coverage.xml

# Issues exclusions
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S5419
sonar.issue.ignore.multicriteria.e1.resourceKey=**/extern/**

# Duplication exclusions
sonar.cpd.exclusions=src/test/**,tests/**,benchmarks/**
