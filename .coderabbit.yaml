# CodeRabbit configuration for Demi Engine
# https://docs.coderabbit.ai/reference/configuration
#
# CodeRabbit provides AI-powered PR reviews. Install the GitHub App at:
#   https://github.com/apps/coderabbitai
#
# When this file is on the default branch, CodeRabbit reads it automatically.

# Language for reviews
language: en-US

# Review profile: "chill" for lighter feedback, "assertive" for thorough reviews
reviews:
  profile: assertive

  # Auto-review settings
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - main
      - master

  # Request changes workflow — auto-approve when comments are resolved
  request_changes_workflow: false

  # Walkthrough settings
  high_level_summary: true
  high_level_summary_in_walkthrough: false
  sequence_diagrams: true
  changed_files_summary: true
  estimate_code_review_effort: true
  collapse_walkthrough: false
  review_status: true

  # PR suggestions
  suggested_reviewers: true
  suggested_labels: true

  # Label instructions for C++ project
  labeling_instructions:
    - label: engine
      instructions: Apply when PR changes files in src/engine/
    - label: assembler
      instructions: Apply when PR changes files in src/assembler/
    - label: opcodes
      instructions: Apply when PR changes files in src/engine/opcodes/
    - label: tests
      instructions: Apply when PR changes test files
    - label: build
      instructions: Apply when PR changes Makefile or build configuration

  # Path-specific review instructions
  path_instructions:
    - path: src/engine/opcodes/**
      instructions: |
        Review opcode implementations carefully:
        - Check register bounds (0-133)
        - Verify memory safety (bounds checking, null checks)
        - Confirm instruction encoding matches the ISA spec
        - Ensure proper error handling for invalid inputs
        - Check for thread safety if applicable
    - path: src/engine/cpu.cpp
      instructions: |
        Critical core component. Review for:
        - Instruction dispatch correctness
        - Cycle counting accuracy
        - Register state integrity
        - Memory system interactions
        - Sandbox boundary enforcement
    - path: src/assembler/**
      instructions: |
        Assembler pipeline review:
        - Lexer/parser/assembler correctness
        - Error messages should be clear and specific
        - Check edge cases in token parsing
        - Verify label resolution and address calculation
    - path: Makefile
      instructions: |
        Build system changes:
        - Preserve parallel build support (-j flag)
        - Keep all build configurations working (debug/release/profile/sanitize)
        - Don't break the test targets
    - path: src/test/**
      instructions: |
        Test code review:
        - Tests should be deterministic
        - Cover edge cases and error paths
        - Use appropriate test macros and assertions

  # File filters — analyze everything except build artifacts and extern
  path_filters:
    - "!build/**"
    - "!build-*/**"
    - "!bin/**"
    - "!extern/**"
    - "!*.o"
    - "!*.d"
    - "!*.pyc"

  # Tools — enable C/C++ static analysis tools
  tools:
    clang:
      enabled: true
    checkmake:
      enabled: true

  # Auto-fix settings
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

# Chat settings
chat:
  auto_reply: true

# Knowledge base — learn from the codebase
knowledge_base:
  learnings:
    scope: auto

  code_guidelines:
    - path: "**.cpp"
      instructions: |
        - C++17 standard, compiled with g++
        - Follow the existing code style (see .clang-format)
        - Use RAII, avoid raw new/delete
        - Prefer stack allocation where possible
        - Use const where appropriate
        - Prefer references over raw pointers
    - path: "**.hpp"
      instructions: |
        - Include guards or #pragma once
        - Document public APIs
        - Keep headers minimal, forward-declare when possible
        - Use include/demi/ for public headers

# Issue enrichment
issue_enrichment:
  auto_enrich:
    enabled: true
